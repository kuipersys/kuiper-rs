apiVersion: ext.api.cloud-api.dev/v1alpha1
kind: ResourceDefinition
metadata:
  name: virtualmachines
  namespace: global
spec:
  group: compute.cloud-api.dev
  scope: Namespace
  names:
    kind: VirtualMachine
    singular: virtualmachine
    plural: virtualmachines
    shortNames:
      - vm
  versions:
    - name: v1alpha1
      enabled: true
      schema:
        type: object
        required:
          - cpuCores
          - memoryGb
          - image
        properties:
          cpuCores:
            type: integer
            minimum: 1
            maximum: 256
          memoryGb:
            type: integer
            minimum: 1
            maximum: 4096
          diskGb:
            type: integer
            minimum: 0
          image:
            type: string
            minLength: 1
          tags:
            type: array
            items:
              type: string
        additionalProperties: false
